services:
  - type: web
    name: freshmart-backend
    env: docker
    plan: free
    region: singapore
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: freshmart-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: freshmart-cache
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
    startCommand: npm run start:migrate:prod

  - type: keyvalue
    name: freshmart-cache
    plan: free
    ipAllowList: []

databases:
  - name: freshmart-db
    plan: free
