services:
  - type: web
    name: freshmart-backend
    env: docker
    plan: free
    region: singapore
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: freshmart-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: freshmart-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
    # buildCommand is not needed for Docker services
    # startCommand is defined in the Dockerfile, but we can override it here
    startCommand: npm run start:migrate:prod

databases:
  - name: freshmart-db
    plan: free

redis:
  - name: freshmart-redis
    plan: free
    # ipAllowList is empty by default for security (only internal access)
    ipAllowList: []
