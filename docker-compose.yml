version: '3.8'

services:



  redis:
    image: redis:7-alpine
    container_name: grocery-redis
    restart: always
    ports:
      - '6379:6379'

  app:
    build:
      context: .
      target: development
    container_name: grocery-app
    restart: always
    ports:
      - '3000:3000'
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - redis
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
